name: tests

on:
  push:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Streamlit Cloud runs 3.12, so CI tests against the production version
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  # GitHub disables cron workflows after 60 quiet days; any push to main
  # re-arms the keepalive so a break from the project can't kill it for good.
  rearm-keepalive:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    continue-on-error: true
    steps:
      - name: Re-enable the keepalive cron if inactivity disabled it
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          wf="repos/${{ github.repository }}/actions/workflows/qdrant-keepalive.yml"
          state=$(gh api "$wf" --jq .state)
          if [ "$state" = "disabled_inactivity" ]; then
            gh api --method PUT "$wf/enable"
            echo "re-enabled the keepalive cron"
          else
            echo "keepalive workflow state: $state (no action)"
          fi
